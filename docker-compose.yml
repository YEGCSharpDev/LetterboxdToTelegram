services:
  app:
    image: preface8675/cinephilechannelpush:latest
    container_name: letterboxd-to-telegram
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    environment:
      - ConnectionStrings__Default=Data Source=/app/data/movies.db
      - Rss__FeedUrl=YOUR_LETTERBOXD_RSS_URL
      - Tmdb__ReadAccessToken=YOUR_TMDB_ACCESS_TOKEN
      - Telegram__BotToken=YOUR_TELEGRAM_BOT_TOKEN
      - Telegram__ChannelId=YOUR_TELEGRAM_CHANNEL_ID
      - Telegram__ErrorChatId=YOUR_ERROR_CHAT_ID
      - WORKER__POLLINGINTERVALMINUTES=10
    healthcheck:
      test: ["CMD", "cat", "/tmp/healthy"]
      interval: 1m
      timeout: 5s
      retries: 3
